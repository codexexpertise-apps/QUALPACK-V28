<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>QualPack — Mode démonstration</title>

  <meta name="theme-color" content="#0D1B2A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QP DEMO" />

  <link rel="manifest" href="./manifest-demo.json" />
  <link rel="apple-touch-icon" href="./assets/icon-192.png" />
  <link rel="icon" type="image/png" href="./assets/icon-192.png" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0D1B2A;
      color: #E8EDF3;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .box {
      width: min(360px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: #132236;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    p {
      margin: 0 0 18px;
      color: #7A8FA6;
      font-size: 14px;
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 46px;
      border-radius: 12px;
      background: #2E7DD1;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="box">
    <img class="logo" src="./assets/icon-192.png" alt="QualPack" />
    <h1>QualPack</h1>
    <p>Ouverture du mode démonstration terrain.</p>
    <a href="./app.html?site_id=qualpack_demo">Ouvrir la démo</a>
  </div>

  <script>
    setTimeout(() => {
      window.location.replace("./app.html?site_id=qualpack_demo");
    }, 600);
  </script>
</body>
</html>
